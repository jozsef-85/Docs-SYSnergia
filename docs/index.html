<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSnergia Docs</title>
<meta name="description" content="Documentación técnica de administración de servidores Linux.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* TOKENS */
:root {
  --ink: #101722;
  --ink2: #1a2331;
  --ink3: #415068;
  --ink4: #71819d;
  --paper: #f4f1ea;
  --paper2: #ebe5da;
  --paper3: #ddd4c2;
  --panel: rgba(255, 251, 244, 0.82);
  --panel-strong: rgba(255, 250, 241, 0.94);
  --rule: rgba(36, 54, 79, 0.14);
  --rule2: rgba(36, 54, 79, 0.24);
  --accent: #f26a3d;
  --accent2: #0f9cc0;
  --accent3: #ffd166;
  --good: #2e8f63;
  --warn: #aa6a1f;
  --code-bg: #101722;
  --code-ink: #edf4ff;

  --serif: 'Fraunces', Georgia, serif;
  --sans: 'Space Grotesk', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
  --shadow-lg: 0 30px 80px rgba(11, 21, 34, 0.16);
  --shadow-md: 0 18px 45px rgba(12, 22, 35, 0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  position: relative;
  font-family: var(--sans);
  min-height: 100vh;
  color: var(--ink);
  font-size: 15px;
  line-height: 1.6;
  background:
    radial-gradient(circle at top left, rgba(15, 156, 192, 0.15), transparent 30%),
    radial-gradient(circle at top right, rgba(242, 106, 61, 0.14), transparent 28%),
    linear-gradient(180deg, #f7f3ec 0%, #efe8dc 50%, #f6f1ea 100%);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.17) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
  background-size: 36px 36px;
  opacity: 0.24;
  pointer-events: none;
}

::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-track { background: rgba(16, 23, 34, 0.06); }
::-webkit-scrollbar-thumb {
  background: rgba(26, 35, 49, 0.26);
  border-radius: 999px;
}

.masthead {
  position: sticky;
  top: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  gap: 22px;
  min-height: 72px;
  padding: 12px 24px;
  backdrop-filter: blur(18px);
  background:
    linear-gradient(90deg, rgba(11, 19, 31, 0.96), rgba(15, 25, 41, 0.92)),
    linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 12px 30px rgba(9, 18, 31, 0.24);
}

.masthead-logo {
  display: flex;
  align-items: baseline;
  gap: 4px;
  min-width: max-content;
  cursor: pointer;
  text-decoration: none;
  padding-right: 20px;
  border-right: 1px solid rgba(255, 255, 255, 0.08);
}

.logo-sys {
  font-family: var(--serif);
  font-size: 1.35rem;
  font-weight: 900;
  color: #fff8ed;
  letter-spacing: -0.03em;
}

.logo-dot {
  color: var(--accent3);
  font-size: 1.45rem;
  line-height: 1;
}

.logo-docs {
  margin-left: 6px;
  font-family: var(--mono);
  font-size: 0.66rem;
  font-weight: 500;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(214, 226, 243, 0.62);
}

.masthead-right {
  display: flex;
  align-items: center;
  margin-left: auto;
  padding-left: 18px;
  border-left: 1px solid rgba(255, 255, 255, 0.08);
}

.search-wrap { position: relative; }

.search-wrap svg {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(220, 229, 240, 0.48);
  pointer-events: none;
}

.search-inp {
  width: 210px;
  min-height: 40px;
  padding: 0 14px 0 34px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.06);
  color: #fff8ed;
  outline: none;
  font-family: var(--sans);
  font-size: 0.82rem;
  transition: width 0.2s ease, border-color 0.2s ease, background 0.2s ease;
}

.search-inp::placeholder { color: rgba(223, 231, 242, 0.42); }

.search-inp:focus {
  width: 250px;
  border-color: rgba(15, 156, 192, 0.5);
  background: rgba(255, 255, 255, 0.1);
}

.layout {
  display: grid;
  grid-template-columns: 220px 296px minmax(0, 1fr);
  gap: 24px;
  padding: 24px;
  min-height: calc(100vh - 72px);
}

.layout.os-pending {
  grid-template-columns: 220px minmax(0, 1fr);
}

.layout.os-pending .sidebar {
  display: none;
}

.layout.guide-nav-hidden {
  grid-template-columns: 220px minmax(0, 1fr);
}

.layout.guide-nav-hidden .sidebar {
  display: none;
}

.os-sidebar {
  position: sticky;
  top: 96px;
  height: calc(100vh - 120px);
  overflow-y: auto;
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(249, 246, 240, 0.96), rgba(238, 231, 220, 0.96));
  border: 1px solid rgba(16, 23, 34, 0.08);
  box-shadow: 0 16px 40px rgba(16, 23, 34, 0.08);
  padding: 14px 12px;
}

.os-panel-label {
  margin: 4px 8px 10px;
  font-family: var(--mono);
  font-size: 0.61rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink4);
}

.os-panel-list {
  display: grid;
  gap: 8px;
}

.os-panel-item {
  display: grid;
  grid-template-columns: 26px 1fr;
  gap: 10px;
  align-items: center;
  padding: 10px 10px;
  border-radius: 14px;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.56);
  border: 1px solid rgba(16, 23, 34, 0.06);
  transition: background 0.14s ease, border-color 0.14s ease, transform 0.14s ease;
}

.os-panel-item:hover {
  background: rgba(255, 255, 255, 0.9);
  border-color: rgba(15, 156, 192, 0.18);
  transform: translateY(-1px);
}

.os-panel-item.active {
  background: linear-gradient(135deg, #fff0d1, #ffd494);
  border-color: rgba(242, 106, 61, 0.14);
}

.os-panel-emoji {
  font-size: 1rem;
  line-height: 1;
  text-align: center;
}

.os-panel-name {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}

.os-panel-ver {
  margin-top: 1px;
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--ink4);
}

.sidebar {
  position: sticky;
  top: 96px;
  height: calc(100vh - 120px);
  overflow-y: auto;
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(250, 247, 241, 0.96), rgba(238, 231, 220, 0.96));
  border: 1px solid rgba(16, 23, 34, 0.08);
  box-shadow: 0 16px 40px rgba(16, 23, 34, 0.08);
  padding: 12px;
  color: var(--ink);
}

.sb-topbar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 8px;
}

.sb-close {
  width: 32px;
  height: 32px;
  border: 1px solid rgba(16, 23, 34, 0.08);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.68);
  color: var(--ink3);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.9rem;
  line-height: 1;
  transition: background 0.14s ease, color 0.14s ease;
}

.sb-close:hover {
  background: rgba(255, 255, 255, 0.96);
  color: var(--ink);
}

.sb-issue {
  padding: 18px 18px 16px;
  margin-bottom: 10px;
  border-radius: 20px;
  background:
    radial-gradient(circle at top right, rgba(255, 209, 102, 0.2), transparent 34%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.55));
  border: 1px solid rgba(16, 23, 34, 0.08);
}

.sb-issue-label {
  margin-bottom: 6px;
  font-family: var(--mono);
  font-size: 0.64rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink4);
}

.sb-issue-val {
  font-family: var(--serif);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.15;
}

.sb-section + .sb-section { margin-top: 8px; }

.sb-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 16px;
  font-family: var(--mono);
  font-size: 0.67rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink4);
  cursor: pointer;
  user-select: none;
  transition: background 0.16s ease, color 0.16s ease;
}

.sb-hd:hover,
.sb-hd.open {
  background: rgba(16, 23, 34, 0.05);
  color: var(--ink);
}

.sb-hd .arr {
  font-size: 0.7rem;
  transition: transform 0.18s ease;
}

.sb-hd.open .arr { transform: rotate(90deg); }

.sb-items {
  display: none;
  padding: 6px 0 2px;
}

.sb-items.open { display: block; }

.sb-item {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin: 4px 0;
  padding: 10px 14px;
  border-radius: 14px;
  color: var(--ink3);
  font-size: 0.85rem;
  line-height: 1.35;
  cursor: pointer;
  transition: background 0.16s ease, transform 0.16s ease, color 0.16s ease;
}

.sb-item-copy {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  width: 100%;
}

.sb-item:hover {
  color: var(--ink);
  background: rgba(16, 23, 34, 0.05);
  transform: translateX(2px);
}

.sb-item.active {
  color: #101722;
  background: linear-gradient(135deg, #fff0d1, #ffd494);
  box-shadow: 0 10px 24px rgba(255, 209, 102, 0.14);
}

.sb-item .n {
  min-width: 22px;
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 0.64rem;
  color: var(--ink4);
}

.sb-item.pending {
  color: var(--ink2);
}

.sb-item.pending:hover {
  background: rgba(242, 106, 61, 0.06);
}

.sb-item-state {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 34px;
  min-height: 20px;
  padding: 0 7px;
  border-radius: 999px;
  background: rgba(242, 106, 61, 0.1);
  color: #b45521;
  font-family: var(--mono);
  font-size: 0.56rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.sb-item.active .n { color: rgba(16, 23, 34, 0.6); }

.main {
  position: relative;
  min-width: 0;
}

.guide-nav-toggle {
  position: sticky;
  top: 92px;
  z-index: 40;
  display: none;
  align-items: center;
  gap: 8px;
  margin: 0 0 14px auto;
  padding: 8px 12px;
  border: 1px solid rgba(16, 23, 34, 0.08);
  border-radius: 999px;
  background: rgba(255, 250, 241, 0.94);
  color: var(--ink2);
  font-family: var(--mono);
  font-size: 0.64rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 12px 24px rgba(16, 23, 34, 0.08);
}

.guide-nav-toggle.visible {
  display: inline-flex;
}

.main::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 32px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.48), rgba(255, 255, 255, 0.1));
  opacity: 0.44;
  pointer-events: none;
}

.page {
  position: relative;
  max-width: 1120px;
  padding: 34px 42px 88px;
  margin: 0 auto;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.94);
  border: 1px solid rgba(16, 23, 34, 0.08);
  box-shadow: 0 10px 24px rgba(16, 23, 34, 0.08);
}

.bc {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 18px;
  padding: 0 0 10px;
  border-bottom: 1px solid rgba(16, 23, 34, 0.08);
  font-family: var(--mono);
  font-size: 0.64rem;
  color: var(--ink4);
}

.bc-lnk {
  cursor: pointer;
  color: var(--ink3);
  transition: color 0.14s ease;
}

.bc-lnk:hover { color: var(--accent2); }
.bc-sep { color: rgba(65, 80, 104, 0.42); }
.bc-cur { color: var(--ink); }

.ph {
  margin-bottom: 24px;
  padding: 0 0 18px;
  border-bottom: 1px solid rgba(16, 23, 34, 0.1);
}

.ph-kicker {
  margin-bottom: 10px;
  font-family: var(--mono);
  font-size: 0.66rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent2);
}

.ph h1 {
  margin-bottom: 10px;
  font-family: var(--sans);
  font-size: clamp(2rem, 4vw, 2.9rem);
  line-height: 1.06;
  letter-spacing: -0.03em;
  color: var(--ink);
}

.ph .deck {
  max-width: 880px;
  margin-bottom: 12px;
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--ink3);
}

.meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.guide-meta-top {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  margin-bottom: 10px;
}

.meta-tag {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 0 10px;
  border-radius: 3px;
  border: 1px solid;
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.04em;
}

.mt-os {
  color: #0b6b82;
  border-color: rgba(15, 156, 192, 0.24);
  background: rgba(15, 156, 192, 0.08);
}

.mt-ver {
  color: var(--ink3);
  border-color: rgba(65, 80, 104, 0.18);
  background: rgba(65, 80, 104, 0.05);
}

.mt-easy {
  color: var(--good);
  border-color: rgba(46, 143, 99, 0.2);
  background: rgba(46, 143, 99, 0.08);
}

.mt-mid {
  color: var(--warn);
  border-color: rgba(170, 106, 31, 0.2);
  background: rgba(170, 106, 31, 0.08);
}

.mt-hard {
  color: #b8452d;
  border-color: rgba(242, 106, 61, 0.22);
  background: rgba(242, 106, 61, 0.09);
}

.mt-status {
  color: #7a4c11;
  border-color: rgba(255, 209, 102, 0.28);
  background: rgba(255, 209, 102, 0.14);
}

.step {
  margin-bottom: 22px;
  padding-bottom: 10px;
  border-bottom: 1px dotted rgba(16, 23, 34, 0.14);
}

.step-hd {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 0 8px;
}

.step-num-wrap {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  min-width: 48px;
}

.step-num-big {
  display: inline-block;
  min-width: 44px;
  color: #0d667b;
  font-family: var(--mono);
  font-size: 0.84rem;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.step-title {
  flex: 1;
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
}

.step-tog { display: none; }

.step-body {
  padding: 0 0 0 58px;
}

.step-desc {
  margin-bottom: 12px;
  color: var(--ink3);
  font-size: 0.88rem;
  line-height: 1.72;
}

.step-desc code,
.ib code,
.empty code {
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 0.82em;
  color: #0d667b;
  background: rgba(15, 156, 192, 0.06);
  border: 1px solid rgba(15, 156, 192, 0.12);
}

.cb {
  margin: 12px 0;
  overflow: hidden;
  border-radius: 3px;
  background: #f7f7f7;
  border: 1px solid #d8d8d8;
}

.cb-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 6px 10px;
  border-bottom: 1px solid #dddddd;
  background: #f1f1f1;
}

.cb-lang {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #6b778c;
}

.cb-copy {
  min-height: 24px;
  padding: 0 8px;
  border-radius: 3px;
  border: 1px solid #cfcfcf;
  background: #ffffff;
  color: #58657a;
  font-family: var(--mono);
  font-size: 0.58rem;
  cursor: pointer;
  transition: border-color 0.14s ease, color 0.14s ease, background 0.14s ease;
}

.cb-copy:hover {
  border-color: #9fb4d9;
  background: #f9fbff;
  color: #344055;
}

.cb-copy.ok {
  border-color: rgba(46, 143, 99, 0.54);
  color: #9be3be;
}

.cb pre {
  padding: 12px 14px;
  overflow-x: auto;
  color: #2f3745;
  font-family: var(--mono);
  font-size: 0.77rem;
  line-height: 1.7;
  white-space: pre;
}

.gt {
  width: 100%;
  margin: 12px 0;
  overflow: hidden;
  border-collapse: collapse;
  border-radius: 0;
  border-style: hidden;
  box-shadow: 0 0 0 1px rgba(16, 23, 34, 0.1);
  background: #fff;
}

.gt th {
  padding: 8px 10px;
  text-align: left;
  background: #f4f4f4;
  font-family: var(--mono);
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink4);
  border-bottom: 1px solid rgba(16, 23, 34, 0.1);
}

.gt td {
  padding: 8px 10px;
  color: var(--ink3);
  border-bottom: 1px solid rgba(16, 23, 34, 0.06);
  vertical-align: top;
  font-size: 0.82rem;
}

.gt tr:last-child td { border-bottom: none; }

.gt td:first-child {
  color: var(--ink);
  font-family: var(--mono);
  font-size: 0.78rem;
}

.ib {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin: 12px 0;
  padding: 10px 12px;
  border-radius: 3px;
  border: 1px solid transparent;
  font-size: 0.82rem;
  line-height: 1.62;
}

.ib .ico {
  flex-shrink: 0;
  margin-top: 2px;
  font-size: 0.92rem;
}

.ib-note {
  color: #0d667b;
  background: rgba(15, 156, 192, 0.08);
  border-color: rgba(15, 156, 192, 0.14);
}

.ib-warn {
  color: #86511c;
  background: rgba(255, 209, 102, 0.14);
  border-color: rgba(255, 209, 102, 0.22);
}

.ib-tip {
  color: #276d4d;
  background: rgba(46, 143, 99, 0.08);
  border-color: rgba(46, 143, 99, 0.16);
}

.guide-sec {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid rgba(16, 23, 34, 0.08);
}

.guide-sec-hd {
  margin-bottom: 10px;
  font-family: var(--mono);
  font-size: 0.64rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink4);
}

.guide-list {
  display: grid;
  gap: 8px;
}

.guide-list li {
  margin-left: 18px;
  color: var(--ink3);
  font-size: 0.85rem;
  line-height: 1.62;
}

.guide-list code,
.source-note code,
.tr-item code {
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 0.82em;
  color: #0d667b;
  background: rgba(15, 156, 192, 0.06);
  border: 1px solid rgba(15, 156, 192, 0.12);
}

.tr-list {
  display: grid;
  gap: 14px;
}

.tr-item {
  padding: 12px 14px;
  border: 1px solid rgba(16, 23, 34, 0.08);
  background: rgba(248, 248, 248, 0.9);
}

.tr-row + .tr-row {
  margin-top: 6px;
}

.tr-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink4);
}

.tr-text,
.source-note {
  margin-top: 2px;
  color: var(--ink3);
  font-size: 0.84rem;
  line-height: 1.62;
}

.source-list {
  display: grid;
  gap: 10px;
}

.source-item {
  padding: 10px 12px;
  border: 1px solid rgba(16, 23, 34, 0.08);
  background: rgba(255, 255, 255, 0.72);
}

.source-link {

<!-- ══ SCRIPT ══ -->
<script>
const S = { index: null, topics: [], guides: {}, activeId: 'home', activeOS: '', guideNavOpen: false };

/* ─ BOOT ─ */
async function boot() {
  try {
    const r = await fetch('guides/index.json?v=2026-03-18-2', { cache: 'no-store' });
    if (!r.ok) throw new Error('index.json no encontrado');
    S.index = await r.json();
    await preloadTopics();
    await preloadGuides();
    buildOSSidebar();
    buildSidebar();
    goHome();
  } catch(e) {
    set(`<div class="loading"><div class="loading-rule"></div><span style="color:#c41e1e">${e.message}</span></div>`);
  }
}

async function preloadGuides() {
  const ids = [...collectGuideIds()];
  await Promise.all(ids.map(async (id) => {
    try {
      const r = await fetch(`guides/${id}.json`, { cache: 'no-store' });
      if (!r.ok) return;
      S.guides[id] = await r.json();
    } catch (_error) {
      // ignore missing guides during discovery
    }
  }));
}

async function preloadTopics() {
  try {
    const r = await fetch('topics.json?v=2026-03-20-1', { cache: 'no-store' });
    if (!r.ok) throw new Error('topics.json no encontrado');
    const data = await r.json();
    S.topics = Array.isArray(data.topics) ? data.topics : [];
  } catch (_error) {
    S.topics = [];
  }
}

function collectGuideIds() {
  const ids = new Set();
  (S.index.sidebar || []).forEach((sec) => (sec.items || []).forEach((it) => ids.add(it.id)));
  (S.index.news || []).forEach((it) => ids.add(it.guide));
  return ids;
}

function normalize(value) {
  return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
}

function getOSMeta(id = S.activeOS) {
  return S.index.os_list.find((os) => os.id === id) || null;
}

function hasActiveOS() {
  return Boolean(S.activeOS && getOSMeta(S.activeOS));
}

function updateNavVisibility() {
  const layout = document.querySelector('.layout');
  const toggle = document.getElementById('guide-nav-toggle');
  if (!layout) return;
  layout.classList.toggle('os-pending', !hasActiveOS());
  layout.classList.toggle('guide-nav-hidden', hasActiveOS() && !S.guideNavOpen);
  if (toggle) {
    toggle.classList.toggle('visible', hasActiveOS() && !S.guideNavOpen);
  }
}

function showGuideNav() {
  if (!hasActiveOS()) return;
  S.guideNavOpen = true;
  updateNavVisibility();
}

function hideGuideNav() {
  if (!hasActiveOS()) return;
  S.guideNavOpen = false;
  updateNavVisibility();
}

function guideSupportsOS(guide, osId = S.activeOS) {
  if (!osId) return false;
  const os = getOSMeta(osId);
  if (!os) return false;
  const aliases = [normalize(os.id), normalize(os.name), normalize(`${os.name} ${os.version}`)];
  return (guide.os || []).some((label) => {
    const text = normalize(label);
    return aliases.some((alias) => text.includes(alias));
  });
}

function getGuidesForOS(osId = S.activeOS) {
  return Object.values(S.guides).filter((guide) => guideSupportsOS(guide, osId));
}

function resolveTopicOSId(topic) {
  if (topic.os_id) return topic.os_id;
  const text = normalize(topic.os || '');
  const match = (S.index.os_list || []).find((os) => {
    const aliases = [normalize(os.id), normalize(os.name), normalize(`${os.name} ${os.version}`)];
    return aliases.some((alias) => text.includes(alias));
  });
  return match ? match.id : '';
}

function topicSupportsOS(topic, osId = S.activeOS) {
  if (!osId) return false;
  const os = getOSMeta(osId);
  if (!os) return false;
  const topicOSId = resolveTopicOSId(topic);
  if (topicOSId && topicOSId === osId) return true;
  const aliases = [normalize(os.id), normalize(os.name), normalize(`${os.name} ${os.version}`)];
  const text = normalize(`${topicOSId} ${topic.os || ''}`);
  return aliases.some((alias) => text.includes(alias));
}

function getTopicsForOS(osId = S.activeOS) {
  return (S.topics || []).filter((topic) => topicSupportsOS(topic, osId));
}

function getPublishedSidebarSections(osId = S.activeOS) {
  return (S.index.sidebar || [])
    .map((sec) => ({
      section: sec.section,
      items: (sec.items || [])
        .filter((it) => S.guides[it.id] && guideSupportsOS(S.guides[it.id], osId))
        .map((it) => ({
          navId: it.id,
          guideId: it.id,
          label: it.label,
          num: it.num,
          target: 'guide'
        }))
    }))
    .filter((sec) => sec.items.length > 0);
}

function topicCategoryToSection(category) {
  const map = {
    'Install / Initial Config': 'Instalación / Inicio',
    'SSH Server': 'SSH / Acceso Remoto',
    'WEB Server': 'Web Servers',
    'Database': 'Bases de Datos',
    'Containers Infra': 'Contenedores',
    'DNS / DHCP Server': 'DNS / DHCP Server',
    'Virtualization': 'Virtualización',
    'NTP Server': 'Tiempo / Sincronización'
  };
  return map[category] || category || 'Otros';
}

function getPlannedSidebarSections(osId = S.activeOS) {
  const groups = new Map();
  getTopicsForOS(osId)
    .filter((topic) => topic.status !== 'validated')
    .forEach((topic) => {
      const section = topicCategoryToSection(topic.category);
      if (!groups.has(section)) groups.set(section, []);
      groups.get(section).push({
        navId: `topic-${topic.id}`,
        topicId: topic.id,
        guideId: topic.guide_id || '',
        label: topic.title,
        target: 'topic',
        status: topic.status || 'todo'
      });
    });

  return Array.from(groups.entries()).map(([section, items]) => ({
    section,
    items: items.sort((a, b) => a.label.localeCompare(b.label))
  }));
}

function getSidebarSections(osId = S.activeOS) {
  const merged = new Map();
  const pushSectionItem = (section, item, dedupeKey) => {
    if (!merged.has(section)) merged.set(section, { section, keys: new Set(), items: [] });
    const bucket = merged.get(section);
    if (bucket.keys.has(dedupeKey)) return;
    bucket.keys.add(dedupeKey);
    bucket.items.push(item);
  };

  getPublishedSidebarSections(osId).forEach((sec) => {
    sec.items.forEach((item) => pushSectionItem(sec.section, item, `guide:${item.guideId}`));
  });

  getPlannedSidebarSections(osId).forEach((sec) => {
    sec.items.forEach((item) => {
      const key = item.guideId && S.guides[item.guideId] ? `guide:${item.guideId}` : `topic:${item.topicId}`;
      pushSectionItem(sec.section, item, key);
    });
  });

  return Array.from(merged.values()).map((sec) => ({
    section: sec.section,
    items: sec.items.map((item, index) => ({
      ...item,
      num: String(index + 1).padStart(2, '0')
    }))
  }));
}

function getNewsForOS(osId = S.activeOS) {
  return (S.index.news || []).filter((item) => S.guides[item.guide] && guideSupportsOS(S.guides[item.guide], osId));
}

function getCategoryRows(osId = S.activeOS) {
  return getSidebarSections(osId).map((sec) => ({
    section: sec.section,
    firstId: sec.items[0].target === 'guide' ? sec.items[0].guideId : `topic:${sec.items[0].topicId}`,
    firstTarget: sec.items[0].target,
    count: sec.items.length
  }));
}

function getSectionIcon(section) {
  const icons = {
    'Instalación / Inicio': '⚙️',
    'Web Servers': '🌐',
    'Bases de Datos': '🗄️',
    'Contenedores': '📦',
    'Firewall / Seguridad': '🛡️',
    'Monitorización': '📊',
    'SSH / Acceso Remoto': '🔐',
    'DNS / DHCP Server': '📡',
    'Virtualización': '🧱',
    'Tiempo / Sincronización': '🕒'
  };
  return icons[section] || '›';
}

function updateSidebarIssue(sections) {
  const os = getOSMeta();
  const issue = document.querySelector('.sb-issue');
  if (!issue) return;
  const guideCount = sections.reduce((acc, sec) => acc + sec.items.filter((item) => item.target === 'guide').length, 0);
  const topicCount = sections.reduce((acc, sec) => acc + sec.items.filter((item) => item.target === 'topic').length, 0);
  if (!os) {
    issue.innerHTML = `
      <div class="sb-issue-label">Seleccion requerida</div>
      <div class="sb-issue-val">Elige un sistema</div>`;
    return;
  }
  issue.innerHTML = `
    <div class="sb-issue-label">OS activo · ${guideCount} guias · ${topicCount} pendientes</div>
    <div class="sb-issue-val">${os.name} ${os.version}</div>`;
}

/* ─ SIDEBAR ─ */
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  const topbar = sb.querySelector('.sb-topbar');
  const issue = sb.querySelector('.sb-issue');
  const sections = getSidebarSections();
  updateNavVisibility();
  sb.innerHTML = '';
  if (topbar) sb.appendChild(topbar);
  sb.appendChild(issue);
  updateSidebarIssue(sections);
  if (!hasActiveOS()) return;
  if (sections.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'sb-section';
    empty.innerHTML = `
      <div class="sb-hd open"><span>Sin guías</span><span class="arr">•</span></div>
      <div class="sb-items open">
        <div class="sb-item">
          <span class="n">00</span>No hay guías disponibles para este sistema operativo.
        </div>
      </div>`;
    sb.appendChild(empty);
    return;
  }
  sections.forEach((sec, i) => {
    const div = document.createElement('div');
    div.className = 'sb-section';
    div.innerHTML = `
      <div class="sb-hd ${i===0?'open':''}" onclick="toggleSec(this)">
        <span>${sec.section}</span><span class="arr">▶</span>
      </div>
      <div class="sb-items ${i===0?'open':''}">
        ${sec.items.map(it=>`
          <div class="sb-item ${it.target === 'topic' ? 'pending' : ''}" id="si-${it.navId}" onclick="${it.target === 'guide' ? `loadGuide('${it.guideId}')` : `loadTopic('${it.topicId}')`}">
            <span class="n">${it.num}</span>
            <div class="sb-item-copy">
              <span>${it.label}</span>
              ${it.target === 'topic' ? '<span class="sb-item-state">IA</span>' : ''}
            </div>
          </div>`).join('')}
      </div>`;
    sb.appendChild(div);
  });
}
function toggleSec(hd) {
  hd.classList.toggle('open');
  hd.nextElementSibling.classList.toggle('open');
}
function setActive(id) {
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('si-'+id);
  if (el) {
    el.classList.add('active');
    const items = el.closest('.sb-items');
    if (items) { items.classList.add('open'); items.previousElementSibling?.classList.add('open'); }
    el.scrollIntoView({ block:'nearest' });
  }
}

/* ─ OS SIDEBAR ─ */
function buildOSSidebar() {
  const panel = document.getElementById('os-panel-list');
  panel.innerHTML = S.index.os_list.map((os) => `
    <div class="os-panel-item ${os.id===S.activeOS?'active':''}" onclick="pickOS('${os.id}')">
      <span class="os-panel-emoji">${os.emoji}</span>
      <div>
        <div class="os-panel-name">${os.name}</div>
        <div class="os-panel-ver">${os.version}</div>
      </div>
    </div>`).join('');
}

function pickOS(id) {
  S.activeOS = id;
  S.guideNavOpen = true;
  buildOSSidebar();
  buildSidebar();
  if (S.activeId === 'home') goHome();
  else setActive(S.activeId);
}

/* ─ HOME ─ */
function goHome() {
  if (hasActiveOS()) S.guideNavOpen = true;
  updateNavVisibility();
  S.activeId = 'home'; setActive('');
  const idx = S.index;
  const ref = idx.featured_map || null;
  const os = getOSMeta();
  const guides = hasActiveOS() ? getGuidesForOS() : Object.values(S.guides);
  const sections = hasActiveOS() ? getSidebarSections() : [];
  const quickRows = hasActiveOS() ? getCategoryRows() : [];
  const news = hasActiveOS() ? getNewsForOS() : [];
  const sectionItemCount = sections.reduce((acc, sec) => acc + sec.items.length, 0);
  const osTiles = idx.os_list.map(o=>`
    <div class="os-tile ${o.id===S.activeOS?'active':''}" onclick="pickOSTile('${o.id}')">
      <span class="ot-em">${o.emoji}</span>
      <div>
        <div class="ot-name">${o.name}</div>
        <div class="ot-ver">${o.version}</div>
      </div>
    </div>`).join('');
  const catRows = quickRows.length ? quickRows.map(c=>`
    <div class="cat-row" onclick="${c.firstTarget === 'guide' ? `loadGuide('${c.firstId}')` : `loadTopic('${String(c.firstId).replace('topic:', '')}')`}">
      <div class="cat-ico-wrap">${getSectionIcon(c.section)}</div>
      <div><div class="cat-name">${c.section}</div><div class="cat-desc">${c.count} temas para ${os.name}</div></div>
      <span class="cat-arr">→</span>
    </div>`).join('') : `<div class="cat-row"><div class="cat-ico-wrap">↙</div><div><div class="cat-name">Selecciona un sistema operativo</div><div class="cat-desc">La navegación por guías aparecerá cuando elijas una plataforma.</div></div></div>`;
  const newsRows = news.length ? news.map(n=>`
    <div class="news-row">
      <span class="news-dt">${n.date}</span>
      <span class="news-txt" onclick="loadGuide('${n.guide}')">${n.text}</span>
    </div>`).join('') : `<div class="news-row"><span class="news-dt">--</span><span class="news-txt">${os ? `No hay novedades registradas para ${os.name}.` : 'Primero elige un sistema operativo para ver novedades relacionadas.'}</span></div>`;
  const portalSections = sections.length ? sections.map((sec, i)=>`
    <section class="portal-sec anim d${Math.min((i % 5) + 1, 5)}">
      <div class="portal-sec-hd">
        <h3>${sec.section}</h3>
        <span class="portal-count">${sec.items.length} temas</span>
      </div>
      <div class="portal-links">
        ${sec.items.map(it=>`
          <div class="portal-link" onclick="${it.target === 'guide' ? `loadGuide('${it.guideId}')` : `loadTopic('${it.topicId}')`}">
            <span class="portal-link-num">${it.num}</span>
            <span class="portal-link-label">${it.label}${it.target === 'topic' ? ' · pendiente' : ''}</span>
          </div>`).join('')}
      </div>
    </section>`).join('') : `<section class="portal-sec anim d2"><div class="portal-sec-hd"><h3>${os ? 'Sin contenido' : 'Navegación oculta'}</h3><span class="portal-count">${os ? '0 temas' : 'esperando OS'}</span></div><div class="portal-links"><div class="portal-link"><span class="portal-link-num">--</span><span class="portal-link-label">${os ? `Todavía no hay temas registrados para ${os.name}.` : 'La barra de despliegue de guías permanecerá oculta hasta que selecciones un sistema operativo.'}</span></div></div></section>`;
  const refPills = ref ? ref.pills.map(p=>`<span class="ref-pill">${p}</span>`).join('') : '';
  const refCards = ref ? ref.cards.map(c=>`
    <article class="map-card anim d2">
      <div>
        <div class="map-kicker">${c.kicker}</div>
        <h3 class="map-title">${c.title}</h3>
        <p class="map-desc">${c.desc}</p>
      </div>
      <div class="map-tags">${c.tags.map(t=>`<span class="map-tag">${t}</span>`).join('')}</div>
    </article>`).join('') : '';
  const refBlock = ref ? `
      <div class="ref-band anim d4">
        <div class="ref-head">
          <div class="ref-copy">
            <div class="ref-eyebrow">${ref.eyebrow}</div>
            <h2 class="ref-title">${ref.title}</h2>
            <p class="ref-desc">${ref.deck}</p>
            <div class="ref-meta">
              <a class="ref-link" href="${ref.source_url}" target="_blank" rel="noopener noreferrer">${ref.source_label}</a>
              <span class="ref-note">${ref.note}</span>
            </div>
          </div>
          <div class="ref-pills">${refPills}</div>
        </div>
        <div class="map-grid">${refCards}</div>
      </div>` : '';

  set(`
    <div class="home-masthead anim">
      <div class="home-vol">SYSnergia Editorial &nbsp;·&nbsp; Build Network Server</div>
      <div class="home-badge"><strong>${os ? 'OS activo' : 'Paso 1'}</strong><span>${os ? `${os.name} ${os.version}` : 'Selecciona una plataforma'}</span></div>
      <h1 class="home-h1">${os ? `Portal técnico para <em>${os.name}</em>, servicios y tareas frecuentes.` : `Elige un <em>sistema operativo</em> para desplegar el árbol de guías.`}</h1>
      <p class="home-deck">${os ? `${idx.site.tagline} La navegación ahora parte por plataforma activa, filtra el árbol lateral y prioriza guías reales disponibles para ${os.name}.` : `${idx.site.tagline} La columna de guías permanece oculta hasta que selecciones una plataforma en la barra lateral izquierda.`}</p>
      <div class="home-stats">
        <div><div class="stat-n">${os ? sectionItemCount : S.topics.length}<sup>+</sup></div><div class="stat-l">${os ? 'Temas visibles' : 'Temas planificados'}</div></div>
        <div><div class="stat-n">${sections.length}<sup>+</sup></div><div class="stat-l">${os ? 'Dominios' : 'Dominios visibles'}</div></div>
        <div><div class="stat-n">${guides.length}<sup>+</sup></div><div class="stat-l">${os ? 'Guías publicadas' : 'Guías detectadas'}</div></div>
      </div>
    </div>

    <div class="home-body">
      <div style="padding: 24px 0 0; margin-bottom: 0;">
        <div class="section-label">Sistemas operativos</div>
        <div class="os-grid anim d1">${osTiles}</div>
      </div>

      <div class="col-rule" style="margin-top: 0;">
        <div class="col anim d2">
          <div class="section-label">Dominios técnicos</div>
          <div class="cat-list">${catRows}</div>
        </div>
        <div class="col anim d3">
          <div class="section-label">
            Actualizaciones
            <span style="font-size:0.58rem; color:var(--rule2)">recientes</span>
          </div>
          <div class="news-list">${newsRows}</div>
        </div>
      </div>

      <div class="section-label" style="margin-top:16px;">Indice técnico</div>
      <div class="portal-grid">${portalSections}</div>

      ${refBlock}
    </div>`);
  window.scrollTo({ top:0 });
}

function catFirst(id) {
  const m = { web:'nginx-install', db:'mariadb', containers:'docker', ssh:'ssh-keygen',
               security:'firewall-ufw', monitoring:'prometheus', init:'install-initial', ssl:'nginx-ssl' };
  return m[id]||'home';
}
function pickOSTile(id) {
  S.activeOS = id;
  S.guideNavOpen = true;
  buildOSSidebar();
  buildSidebar();
  goHome();
}

function getTopicById(id) {
  return (S.topics || []).find((topic) => topic.id === id) || null;
}

function renderTopic(topic) {
  const osMeta = getOSMeta(resolveTopicOSId(topic)) || getOSMeta();
  const osLabel = topic.os || (osMeta ? `${osMeta.name} ${osMeta.version}` : 'Plataforma pendiente');
  set(`<div class="page">
    <div class="bc anim">
      <span class="bc-lnk" onclick="goHome()">Inicio</span>
      <span class="bc-sep">/</span>
      <span class="bc-lnk">${topicCategoryToSection(topic.category)}</span>
      <span class="bc-sep">/</span>
      <span class="bc-cur">${topic.title}</span>
    </div>
    <div class="ph anim">
      <div class="ph-kicker">Tema pendiente</div>
      <div class="guide-meta-top">
        <span class="meta-tag mt-os">${osLabel}</span>
        <span class="meta-tag mt-ver">${topic.category}</span>
        <span class="meta-tag mt-status">${topic.status || 'todo'}</span>
      </div>
      <h1>${topic.title}</h1>
      <p class="deck">Este tema ya quedó asociado al sistema operativo activo y forma parte del backlog inspirado en Server World / hungpt7. Todavía no existe el JSON publicado para esta guía.</p>
    </div>
    <section class="guide-sec anim d2">
      <div class="guide-sec-hd">Siguiente paso</div>
      <ul class="guide-list">
        <li>Genera el borrador con <code>npm run guide:next-prompt -- --id ${topic.id}</code>.</li>
        <li>Guarda el resultado en <code>docs/guides/${topic.id}.json</code> o enlázalo a una guía compartida.</li>
        <li>Completa troubleshooting y fuentes antes de marcarlo como revisado.</li>
      </ul>
    </section>
  </div>`);
}

function loadTopic(id) {
  const topic = getTopicById(id);
  if (!topic) {
    set(`<div class="loading"><div class="loading-rule"></div><span>No se encontró el tema solicitado.</span></div>`);
    return;
  }
  S.activeId = `topic-${id}`;
  setActive(S.activeId);
  if (hasActiveOS()) hideGuideNav();
  window.scrollTo({ top:0 });
  if (topic.guide_id && S.guides[topic.guide_id]) {
    loadGuide(topic.guide_id);
    return;
  }
  renderTopic(topic);
}

/* ─ LOAD GUIDE ─ */
async function loadGuide(id) {
  if (id==='home') { goHome(); return; }
  S.activeId = id; setActive(id);
  if (hasActiveOS()) hideGuideNav();
  window.scrollTo({ top:0 });
  if (S.guides[id]) { renderGuide(S.guides[id]); return; }
  set(`<div class="loading"><div class="loading-rule"></div><span>Cargando guía…</span></div>`);
  try {
    const r = await fetch(`guides/${id}.json`);
    if (!r.ok) throw new Error(`guides/${id}.json`);
    const g = await r.json();
    S.guides[id] = g;
    renderGuide(g);
  } catch(e) {
    set(`<div class="page"><div class="empty anim">
      <div class="empty-rule"></div>
      <h3>Guía en construcción</h3>
      <p>Añade el archivo <code>guides/${id}.json</code> al repositorio para publicar esta guía.</p>
    </div></div>`);
  }
}

/* ─ RENDER GUIDE ─ */
function renderGuide(g) {
  const osTags = g.os.map(o=>`<span class="meta-tag mt-os">${o}</span>`).join('');
  const xTags  = g.tags.map(t=>{
    const cls = t.label==='Básico'?'mt-easy':t.label==='Intermedio'?'mt-mid':
                t.label==='Avanzado'?'mt-hard':'mt-ver';
    return `<span class="meta-tag ${cls}">${t.label}</span>`;
  }).join('');
  const editorialTags = [
    g.status ? `<span class="meta-tag mt-status">${g.status}</span>` : '',
    g.reviewed_at ? `<span class="meta-tag mt-ver">revisada ${g.reviewed_at}</span>` : ''
  ].join('');
  const steps = g.steps.map((s,i)=>`
    <div class="step anim d${Math.min(i+1,5)}">
      <div class="step-hd">
        <div class="step-num-wrap">
          <span class="step-num-big">[${s.num}]</span>
        </div>
        <div class="step-title">${s.title}</div>
      </div>
      <div class="step-body">
        ${s.desc?`<p class="step-desc">${s.desc}</p>`:''}
        ${(s.blocks||[]).map(b=>renderCB(b)).join('')}
        ${s.table?renderTable(s.table):''}
        ${s.info?renderIB(s.info):''}
      </div>
    </div>`).join('');
  const prerequisites = Array.isArray(g.prerequisites) && g.prerequisites.length
    ? `<section class="guide-sec anim d2"><div class="guide-sec-hd">Prerequisitos</div><ul class="guide-list">${g.prerequisites.map(item => `<li>${item}</li>`).join('')}</ul></section>`
    : '';
  const appliesTo = Array.isArray(g.applies_to) && g.applies_to.length
    ? `<section class="guide-sec anim d2"><div class="guide-sec-hd">Aplica a</div><ul class="guide-list">${g.applies_to.map(item => `<li>${item}</li>`).join('')}</ul></section>`
    : '';
  const verification = g.verification
    ? `<section class="guide-sec anim d3">
        <div class="guide-sec-hd">Verificación</div>
        ${g.verification.summary ? `<p class="tr-text">${g.verification.summary}</p>` : ''}
        ${Array.isArray(g.verification.checks) && g.verification.checks.length ? `<ul class="guide-list">${g.verification.checks.map(item => `<li>${item}</li>`).join('')}</ul>` : ''}
      </section>`
    : '';
  const troubleshooting = Array.isArray(g.troubleshooting) && g.troubleshooting.length
    ? `<section class="guide-sec anim d4">
        <div class="guide-sec-hd">Troubleshooting</div>
        <div class="tr-list">${g.troubleshooting.map(issue => `
          <article class="tr-item">
            <div class="tr-row"><div class="tr-label">Síntoma</div><div class="tr-text">${issue.symptom}</div></div>
            ${issue.cause ? `<div class="tr-row"><div class="tr-label">Causa</div><div class="tr-text">${issue.cause}</div></div>` : ''}
            ${issue.fix ? `<div class="tr-row"><div class="tr-label">Solución</div><div class="tr-text">${issue.fix}</div></div>` : ''}
            ${(issue.blocks || []).map(b => renderCB(b)).join('')}
            ${issue.verify ? `<div class="tr-row"><div class="tr-label">Validación</div><div class="tr-text">${issue.verify}</div></div>` : ''}
          </article>`).join('')}
        </div>
      </section>`
    : '';
  const sources = Array.isArray(g.sources) && g.sources.length
    ? `<section class="guide-sec anim d5">
        <div class="guide-sec-hd">Fuentes</div>
        <div class="source-list">${g.sources.map(source => `
          <article class="source-item">
            <a class="source-link" href="${source.url}" target="_blank" rel="noopener noreferrer">${source.label}</a>
            ${source.note ? `<div class="source-note">${source.note}</div>` : ''}
          </article>`).join('')}
        </div>
      </section>`
    : '';

  set(`<div class="page">
    <div class="bc anim">
      <span class="bc-lnk" onclick="goHome()">Inicio</span>
      <span class="bc-sep">/</span>
      <span class="bc-lnk">${g.category}</span>
      <span class="bc-sep">/</span>
      <span class="bc-cur">${g.title}</span>
    </div>
    <div class="ph anim">
      <div class="ph-kicker">${g.category}</div>
      <div class="guide-meta-top">${editorialTags}</div>
      <h1>${g.title}</h1>
      <p class="deck">${g.subtitle}</p>
      <div class="meta-row">${osTags}${xTags}</div>
    </div>
    ${steps}
    ${prerequisites}
    ${appliesTo}
    ${verification}
    ${troubleshooting}
    ${sources}
  </div>`);
}

function renderCB(b) {
  return `<div class="cb">
    <div class="cb-bar">
      <span class="cb-lang">${b.lang}</span>
      <button class="cb-copy" onclick="doCopy(this)">Copiar</button>
    </div>
    <pre>${esc(b.code)}</pre>
  </div>`;
}
function renderTable(rows) {
  const [hd,...body] = rows;
  return `<table class="gt">
    <thead><tr>${hd.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;
}
function renderIB(info) {
  const ico = { note:'ℹ', warn:'⚠', tip:'→' };
  return `<div class="ib ib-${info.type}">
    <span class="ico">${ico[info.type]||'·'}</span>
    <span>${info.text}</span>
  </div>`;
}

/* ─ INTERACTIONS ─ */
function doCopy(btn) {
  const pre = btn.closest('.cb').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(()=>{
    btn.textContent = '✓'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='Copiar'; btn.classList.remove('ok'); }, 2000);
  });
}
function handleSearch(q) {
  if (!q||q.length<2) return;
  const lq = q.toLowerCase();
  const guides = Object.entries(S.guides)
    .map(([id, guide]) => ({ id, guide }))
    .sort((a, b) => Number(guideSupportsOS(b.guide)) - Number(guideSupportsOS(a.guide)));
  for (const { id, guide } of guides) {
    const haystack = [id, guide.title, guide.subtitle, guide.category, ...(guide.os || [])].join(' ').toLowerCase();
    if (haystack.includes(lq)) {
      loadGuide(id);
      document.getElementById('search-inp').blur();
      return;
    }
  }
}

/* ─ UTILS ─ */
function set(html) { document.getElementById('content').innerHTML = html; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

boot();
</script>
